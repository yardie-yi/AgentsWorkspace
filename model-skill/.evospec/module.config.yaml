# ── 路径约定（供 AI Agent 解析） ────────────────────────────────
# 本文件位置：<module_root>/.evospec/module.config.yaml
# 模块根目录（module_root）：platform/autoai-services/cluster-app/
# local_project_path: .   → 即 module_root
# artifacts.local_path    → 相对 module_root；".." = autoai-services/
# ────────────────────────────────────────────────────────────────
module:
  id: cluster-app
  name: cluster-app 仪表盘HMI应用模块

build:
  server:
    host: 172.19.160.73
    user: yiwanming
    password: " "
  remote_build_dir: ~/adcj/platform/autoai-services/build-script
  toolchain_init: source env_setup.sh ac8215e
  make_target: cluster-app
  local_project_path: .
  # 编译步骤：cd build-script → source env_setup.sh ac8215e → make cluster-app
  # 产物输出至：..\build\autoai-services\bin\awtkhmi（相对模块根目录）

artifacts:
  # 场景一：仅修改代码 — 只推二进制文件
  - id: main_bin
    local_path: ..\build\autoai-services\bin\awtkhmi\bin\awtkhmi
    board_path: /mnt/autoai_platform/bin/awtkhmi/bin/awtkhmi
  # 场景二：修改了资源文件（图片等）— 推整个 awtkhmi 目录
  - id: awtkhmi_dir
    description: "完整 awtkhmi 目录，含资源文件"
    local_path: ..\build\autoai-services\bin\awtkhmi
    board_path: /mnt/autoai_platform/bin

board:
  write_protect_cmd: "echo clear_all_wp > /proc/nand_wp"
  processes_to_kill: [awtkhmi, appmgr]
  config_file: PLACEHOLDER        # 待确认板端配置文件路径
  plugin_deploy_path: PLACEHOLDER # 待确认（如无插件可删除）

package:
  artifacts: []  # cluster-app 无升级包产物

related_modules:
  - name: 消息总线（VehicleInterfaceBase）
    path: platform/autoai-services/vehicle-service/
  - name: 应用管理（appmgr）
    path: platform/autoai-services/appmgr/
  - name: 编译脚本
    path: platform/autoai-services/build-script/

debug:
  log_tags:
    - PLACEHOLDER  # 待确认 cluster-app 实际日志 TAG
