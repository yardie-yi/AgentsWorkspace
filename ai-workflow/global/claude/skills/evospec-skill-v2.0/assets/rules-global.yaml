# 全局规则
# 规则格式说明：
# - id: 规则ID，G开头为全局规则，M{模块缩写}开头为模块规则
# - content: 规则内容描述
# - category: 规则分类（communication/data/business/interface/architecture）
# - keywords: 关键词列表（用于任务匹配）
# - priority: 优先级（critical/high/medium/low）
# - trigger_pattern: 触发模式（精确匹配/OR匹配/正则匹配）
# - action: 执行动作
# - scope: 规则范围（global/module:{模块名})
# - phase: 适用阶段（agile/req/design/detail/code/test/release）
# - status: 规则状态（enabled/disabled/deprecated/archived）
# - source: 规则来源（default/user/architect）
# - created_at: 创建时间
# - data_ref: 协议引用（可选）
#
# ===== P0自进化机制 =====
# - identity_hash: 规则身份哈希（用于识别重复规则，避免重复创建）
# - version: 规则版本号（语义版本，如0.1.0）
# - history: 版本历史记录（可选，记录规则演变）
# - replaces: 替代的旧版本ID（可选，新规则替代旧规则时使用）

# ===== 分类说明 =====
# communication: 通信协议 - IPC方式、接口协议、通信格式、超时重试
# data: 数据规范 - 数据格式、缓存策略、持久化、数据校验
# business: 业务约束 - 业务规则、状态管理、错误处理、边界条件
# interface: 接口规范 - 对外API、参数定义、返回值格式、版本兼容
# architecture: 架构约束 - 分层设计、依赖关系、模块边界、设计模式

rules:
  # ============================================================
  # 架构约束类
  # ============================================================
  - id: G001
    content: "遵循MVVM架构模式"
    category: architecture
    keywords: [MVVM, 架构, 分层, ViewModel, Repository]
    priority: critical
    trigger_pattern: "架构|MVVM|architecture|分层"
    action: "UI -> ViewModel -> Repository -> DataSource"
    scope: global
    phase: [agile, design, detail, code]
    status: enabled
    source: default
    created_at: 2026-04-09
    identity_hash: "38e311f4"
    version: "0.1.0"

  - id: G002
    content: "按功能模块分包"
    category: architecture
    keywords: [分包, 目录, package, 模块]
    priority: high
    trigger_pattern: "package|包名|目录|分包"
    action: "按功能分包，如ui.weather, data.weather, domain.weather"
    scope: global
    phase: [agile, code]
    status: enabled
    source: default
    created_at: 2026-04-09
    identity_hash: "717d00b2"
    version: "0.1.0"

  - id: G003
