# 项目配置模板
# 初始化项目时自动生成

project:
  name: "MyProject"
  stack: "android"  # android/qnx/linux/cpp
  modules: []  # 模块列表，设计阶段填充

# 敏捷模式配置
agile:
  enabled: true
  rules_always_load: true  # 始终加载规则
  min_interaction: true    # 最小交互
  gate: compile            # 编译门控

# 流程化模式配置
flow:
  enabled: true
  phase_gate: true         # 阶段门控
  parallel_execution: true # 并行执行

# 文档生成配置
doc:
  enabled: true
  weight: low              # 低权重（可选）
  reverse_generate: true   # 反向生成
  templates_dir: ".evospec/templates"
  output_dir: ".evospec/outputs/docs"

# 构建配置
build:
  command: "./gradlew assembleDebug"
  test_command: "./gradlew test"
  lint_command: "./gradlew lint"
  max_retry: 3

# 模块关键词（用于scope推断）
module_keywords:
  # 设计阶段填充，示例：
  # weather: ["天气", "温度", "湿度", "预报", "weather"]
  # navigation: ["导航", "路径", "路线", "地图", "navigation"]

# 同义词扩展（扩展trigger匹配）
synonyms:
  "跨进程": ["IPC", "Binder", "AIDL", "进程间通信"]
  "协程": ["coroutine", "Coroutines", "async", "launch"]
  "视图": ["View", "UI", "Fragment", "Activity"]